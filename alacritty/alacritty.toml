[window]
decorations = "Full"
startup_mode = "Windowed"
dynamic_padding = true
decorations_theme_variant = "Dark"

[font]
size = 12

[font.normal]
family = "monospace"
style = "Regular"

[font.bold]
style = "Bold"

[font.italic]
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[terminal]
shell = "/bin/bash"

[general]
import = [
  "themes/atom.toml"
]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
